name: Release

# Build installers on a version tag (e.g. v0.1.18) and attach them to a GitHub
# Release. Windows, macOS, and Linux each build on their NATIVE runner — no Wine,
# no cross-compilation — so the artifacts are exactly what `electron-builder`
# would produce on that OS locally.
#
# NOTE: the Linux AppImage is built and published but is currently UNTESTED on
# real Linux hardware (CI runs the test suite on Linux, but no one has verified
# the packaged AppImage runs end-to-end). Provided as a convenience.
on:
  push:
    tags:
      - 'v*'
  # Allow building installers on demand without cutting a release.
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows installer
            build: npx electron-builder --win --x64 --publish never
            artifact: dist/*.exe
          - os: macos-latest
            name: macOS installers
            build: npx electron-builder --mac --publish never
            artifact: dist/*.dmg
          - os: ubuntu-latest
            name: Linux AppImage (untested)
            build: npx electron-builder --linux --publish never
            artifact: dist/*.AppImage

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Guard: never ship a build whose tests don't pass.
      - name: Run tests
        run: npm test

      - name: Build installer(s)
        run: ${{ matrix.build }}
        env:
          # No code-signing secrets are set, so this produces UNSIGNED installers
          # (the bundled "Read Me First" covers the one-time OS warnings). To sign
          # later, add CSC_LINK/CSC_KEY_PASSWORD (Windows) and the Apple notarize
          # secrets (see README "Code signing & notarization").
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (per-OS)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-installers
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a Release for an actual tag push, not workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach installers to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: true
